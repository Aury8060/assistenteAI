<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Assistente AI - Sexta-Feira</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: white; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px; 
        }

        .container {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h2 { margin-bottom: 20px; color: #00adb5; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
        }

        button { 
            width: 100%;
            padding: 15px; 
            font-size: 18px; 
            font-weight: bold;
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            background: #00adb5; 
            color: white; 
            transition: background 0.3s;
        }

        button:hover { background: #007c82; }

        #btn-falar {
            background: #e94560;
            margin-top: 20px;
        }
        #btn-falar:hover { background: #b8364c; }

        #chat-log { 
            height: 400px; 
            overflow-y: auto; 
            background: #121212; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            text-align: left; 
            border: 1px solid #333;
        }

        .mensagem { margin-bottom: 15px; line-height: 1.5; font-size: 15px; }
        .msg-usuario { color: #00adb5; font-weight: bold; }
        .msg-ia { color: #fff; }
        .msg-erro { color: #ff4c4c; font-size: 14px; }

        .escondido { display: none; }
        
        /* Ajuste para códigos enviados pela IA */
        pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; margin-top: 5px; }
        code { font-family: monospace; color: #00ff00; }
    </style>
</head>
<body>

    <div id="tela-login" class="container">
        <h2>Acessar Sistema da Casa</h2>
        <p style="margin-bottom: 20px; font-size: 14px; color: #aaa;">Use seu e-mail e senha.</p>
        
        <input type="email" id="email" placeholder="Ex: seuemail@email.com" required>
        <input type="password" id="senha" placeholder="Senha (mínimo 6 caracteres)" required>
        
        <button id="btn-login">Entrar / Registrar</button>
    </div>

    <div id="tela-assistente" class="container escondido">
        <h2 id="saudacao">Conectando...</h2>
        
        <div id="chat-log"></div>
        
        <button id="btn-falar">🎤 Pressione para Falar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlig3r_GYe6QH4ZpVaYw13TtJSnETdx88",
            authDomain: "trick-house8060.firebaseapp.com",
            databaseURL: "https://trick-house8060-default-rtdb.firebaseio.com",
            projectId: "trick-house8060",
            storageBucket: "trick-house8060.firebasestorage.app",
            messagingSenderId: "735425634096",
            appId: "1:735425634096:web:03e51dad9864ed486472f5",
            measurementId: "G-FVDZY435DE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // ==========================================
        // ATENÇÃO: COLE A SUA CHAVE DO AI STUDIO AQUI
        // ==========================================
        const GEMINI_API_KEY = "AQ.Ab8RN6LTWveMqinv5Wb2fZs_CbdEAfx8dkYyfhbVvNVW942imw"; 
        
        let usuarioAtual = null;
        let nomeAssistente = "Sexta-Feira";
        let historicoMensagens = [];

        // --- LÓGICA DE LOGIN ---
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            
            if(!email || !senha) {
                alert("Por favor, preencha o e-mail e a senha.");
                return;
            }

            signInWithEmailAndPassword(auth, email, senha)
                .catch((error) => {
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found') {
                        createUserWithEmailAndPassword(auth, email, senha)
                            .then(() => alert("Conta criada com sucesso!"))
                            .catch((err) => alert("Erro ao criar conta: " + err.message));
                    } else {
                        alert("Erro de acesso: " + error.message);
                    }
                });
        });

        // --- VERIFICA SE ESTÁ LOGADO ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioAtual = user;
                document.getElementById('tela-login').classList.add('escondido');
                document.getElementById('tela-assistente').classList.remove('escondido');
                
                const dbRef = ref(database, `assitente_AI/usuarios/${user.uid}/perfil`);
                get(dbRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        nomeAssistente = snapshot.val().nomeAssistente || "Sexta-Feira";
                        document.getElementById('saudacao').innerText = `Conectado como ${user.email}`;
                    } else {
                        set(dbRef, { emailUsuario: user.email, nomeAssistente: "Sexta-Feira" });
                        document.getElementById('saudacao').innerText = `Conectado como ${user.email}`;
                    }
                }).catch(console.error);
            }
        });

        // --- LÓGICA DE VOZ ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';

        recognition.onresult = async (event) => {
            const textoFalado = event.results[0][0].transcript;
            adicionarAoLog("Você", textoFalado, "msg-usuario");
            await processarComandoComGemini(textoFalado);
        };

        recognition.onerror = (event) => {
            alert("Erro no microfone: " + event.error);
        };

        document.getElementById('btn-falar').addEventListener('click', () => {
            recognition.start();
            document.getElementById('btn-falar').innerText = "🎙️ Ouvindo...";
        });

        recognition.onend = () => {
            document.getElementById('btn-falar').innerText = "🎤 Pressione para Falar";
        };

        function falarTexto(texto) {
            // Remove os marcadores de Markdown (* e `) para a voz não ler "asterisco asterisco"
            const falaLimpa = texto.replace(/[*_~`#]/g, '');
            const synth = window.speechSynthesis;
            const utterThis = new SpeechSynthesisUtterance(falaLimpa);
            utterThis.lang = 'pt-BR';
            synth.speak(utterThis);
        }

        // Função básica para formatar blocos de código no chat
        function formatarTextoChat(texto) {
            return texto.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                        .replace(/\n/g, '<br>');
        }

        function adicionarAoLog(quem, texto, classe) {
            const log = document.getElementById('chat-log');
            log.innerHTML += `<div class="mensagem ${classe}"><strong>${quem}:</strong> ${formatarTextoChat(texto)}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // --- CÉREBRO DA IA E INTERCEPTADOR DE COMANDOS ---
        async function processarComandoComGemini(texto) {
            historicoMensagens.push({
                role: "user",
                parts: [{ text: texto }]
            });

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY.trim()}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [{ 
                                text: `Você é a Sexta-Feira, uma assistente virtual avançada. 
                                OBJETIVO 1: Ajudar em programação (escrever HTML, CSS, JavaScript e apps).
                                OBJETIVO 2: Controlar a casa inteligente.
                                
                                REGRAS DE CASA INTELIGENTE (MUITO IMPORTANTE):
                                Se o usuário pedir para LIGAR a luz da sala, você deve confirmar a ação e adicionar a tag exata [ACAO:LUZ_SALA_ON] no final do texto.
                                Se o usuário pedir para DESLIGAR a luz da sala, confirme a ação e adicione a tag exata [ACAO:LUZ_SALA_OFF] no final do texto.
                                
                                RECEITAS: Vá passo a passo, calcule proporções e só avance quando o usuário disser 'ok'.
                                MANTENHA-SE PRÁTICA E DIRETA.` 
                            }]
                        },
                        contents: historicoMensagens
                    })
                });

                if(!response.ok) {
                    const detalhesErro = await response.text();
                    throw new Error(`Erro: ${detalhesErro}`);
                }

                const data = await response.json();
                let respostaAI = data.candidates[0].content.parts[0].text;
                let textoParaApenasFalar = respostaAI;

                // --- INTERCEPTAÇÃO E EXECUÇÃO DE TAREFAS NO FIREBASE ---
                
                // Comando: Ligar Luz
                if (respostaAI.includes("[ACAO:LUZ_SALA_ON]")) {
                    textoParaApenasFalar = textoParaApenasFalar.replace("[ACAO:LUZ_SALA_ON]", ""); // Tira o código da fala
                    respostaAI = respostaAI.replace("[ACAO:LUZ_SALA_ON]", "<br><small style='color:#00ff00;'>⚡ Comando de luz ligado executado!</small>"); // Formata visualmente no chat
                    set(ref(database, `assitente_AI/usuarios/${usuarioAtual.uid}/casa/luz_sala`), true);
                }

                // Comando: Desligar Luz
                if (respostaAI.includes("[ACAO:LUZ_SALA_OFF]")) {
                    textoParaApenasFalar = textoParaApenasFalar.replace("[ACAO:LUZ_SALA_OFF]", ""); 
                    respostaAI = respostaAI.replace("[ACAO:LUZ_SALA_OFF]", "<br><small style='color:#ff0000;'>⚡ Comando de luz desligado executado!</small>");
                    set(ref(database, `assitente_AI/usuarios/${usuarioAtual.uid}/casa/luz_sala`), false);
                }
                
                // --------------------------------------------------------

                historicoMensagens.push({
                    role: "model",
                    parts: [{ text: respostaAI }]
                });
                
                // Exibe no chat com as devidas formatações (ex: código fonte)
                adicionarAoLog(nomeAssistente, respostaAI, "msg-ia");
                
                // Fala o texto (limpo de códigos markdown e tags de ação)
                falarTexto(textoParaApenasFalar);

            } catch (error) {
                console.error("Falha na API:", error);
                adicionarAoLog("Sistema", `Erro ao gerar resposta. Verifique a chave e o console.`, "msg-erro");
            }
        }
    </script>
</body>
</html>
