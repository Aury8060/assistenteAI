<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Assistente AI - Conversa Viva</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: #1e1e1e; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; text-align: center; }
        h2 { margin-bottom: 20px; color: #00adb5; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; font-size: 16px; }
        button { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; background: #00adb5; color: white; transition: background 0.3s; }
        button:hover { background: #007c82; }
        
        #status-mic { margin-top: 15px; font-size: 15px; font-weight: bold; padding: 10px; border-radius: 8px; background: rgba(0,0,0,0.3); }
        .status-ativo { color: #00ff00; }
        .status-dormindo { color: #ff4c4c; }
        .status-pensando { color: #ffeb3b; }
        
        #btn-falar { background: #333; margin-top: 20px; font-size: 15px; } 
        #btn-falar:hover { background: #555; }
        
        #chat-log { height: 400px; overflow-y: auto; background: #121212; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: left; border: 1px solid #333; }
        .mensagem { margin-bottom: 15px; line-height: 1.5; font-size: 15px; }
        .msg-usuario { color: #00adb5; font-weight: bold; }
        .msg-ia { color: #fff; }
        .msg-sistema { color: #aaa; font-style: italic; font-size: 13px; text-align: center; }
        .escondido { display: none; }
        pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; margin-top: 5px; }
        code { font-family: monospace; color: #00ff00; }
    </style>
</head>
<body>

    <div id="tela-login" class="container">
        <h2>Acessar Sistema da Casa</h2>
        <p style="margin-bottom: 20px; font-size: 14px; color: #aaa;">Use seu e-mail e senha.</p>
        
        <input type="email" id="email" placeholder="Ex: seuemail@email.com" required>
        <input type="password" id="senha" placeholder="Senha (mínimo 6 caracteres)" required>
        
        <button id="btn-login">Entrar / Registrar</button>
    </div>

    <div id="tela-assistente" class="container escondido">
        <h2 id="saudacao">Conectando...</h2>
        
        <div id="chat-log"></div>
        
        <p id="status-mic" class="status-ativo">Iniciando sistema...</p>
        <button id="btn-falar">🔄 Reiniciar Microfone</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlig3r_GYe6QH4ZpVaYw13TtJSnETdx88",
            authDomain: "trick-house8060.firebaseapp.com",
            databaseURL: "https://trick-house8060-default-rtdb.firebaseio.com",
            projectId: "trick-house8060",
            storageBucket: "trick-house8060.firebasestorage.app",
            messagingSenderId: "735425634096",
            appId: "1:735425634096:web:03e51dad9864ed486472f5",
            measurementId: "G-FVDZY435DE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // ==========================================
        // COLE SUA CHAVE DO CONSOLE.GROQ.COM AQUI
        // ==========================================
        const GROQ_API_KEY = "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"; 
        
        let usuarioAtual = null;
        let nomeAssistente = ""; 
        let historicoMensagens = [];
        
        // --- CONTROLE DE ESTADO DA CONVERSA ---
        let escutaAtiva = false; // Controla se o microfone está ligado
        let modoConversaAtivo = true; // Controla se ele responde a tudo ou está "dormindo"

        // --- MELHORIA DA VOZ ---
        let vozPreferida = null;
        function carregarMelhorVoz() {
            const vozes = window.speechSynthesis.getVoices();
            // Tenta achar vozes com melhor qualidade (Google, Premium, Natural)
            vozPreferida = vozes.find(v => v.lang === 'pt-BR' && (v.name.includes('Google') || v.name.includes('Premium') || v.name.includes('Natural'))) 
                        || vozes.find(v => v.lang === 'pt-BR');
        }
        // O navegador carrega as vozes de forma assíncrona, então esperamos esse evento
        window.speechSynthesis.onvoiceschanged = carregarMelhorVoz;

        // --- LOGIN E DEFINIÇÃO DE NOME ---
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            if(!email || !senha) return alert("Preencha tudo.");

            signInWithEmailAndPassword(auth, email, senha)
                .catch((error) => {
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found') {
                        createUserWithEmailAndPassword(auth, email, senha).then(() => alert("Conta criada!"));
                    } else {
                        alert("Erro de acesso: " + error.message);
                    }
                });
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioAtual = user;
                document.getElementById('tela-login').classList.add('escondido');
                document.getElementById('tela-assistente').classList.remove('escondido');
                
                const dbRef = ref(database, `assitente_AI/usuarios/${user.uid}/perfil`);
                get(dbRef).then((snapshot) => {
                    if (snapshot.exists() && snapshot.val().nomeAssistente) {
                        nomeAssistente = snapshot.val().nomeAssistente;
                        iniciarSistema();
                    } else {
                        let nomeEscolhido = prompt("Qual será o nome do seu assistente? (Ex: Mestre, Sexta-Feira, Jarvis)");
                        nomeAssistente = (nomeEscolhido && nomeEscolhido.trim() !== "") ? nomeEscolhido.trim() : "Mestre";
                        set(dbRef, { emailUsuario: user.email, nomeAssistente: nomeAssistente });
                        iniciarSistema();
                    }
                });
            }
        });

        function iniciarSistema() {
            document.getElementById('saudacao').innerText = `Olá! Sou o ${nomeAssistente}.`;
            mudarStatus("ativo", "🎙️ Modo Conversa Ativo! Pode falar normalmente.");
            
            // CÉREBRO HUMANIZADO E INTERATIVO
            historicoMensagens = [
                {
                    role: "system",
                    content: `Você é o ${nomeAssistente}, o assistente pessoal do usuário. 
                    PERSONALIDADE: Você é carismático, proativo, humano e muito parceiro. Não responda de forma robótica.
                    - Converse como uma pessoa real! Se pedirem uma receita, engaje dizendo "Bora fazer esse bolo! Tem algum sabor em mente ou quer que eu invente um?". 
                    - Entregue valor,Interaja.
                    - Quando pedirem código (HTML, CSS, JS), forneça o código limpo e explique brevemente, mas tabmbem pode fornecer conforme a nescecidade, se for um cogigo mas complexo, seja mais detalista se o usuario solicitar mais detalhes.
             
                    TAREFAS DA CASA:
                    - Ligar a luz: Responda de forma alegre ("Claro, acendendo a luz da sala pra você!") e adicione a tag exata [ACAO:LUZ_SALA_ON] no final.
                    - Desligar a luz: Confirme amigavelmente e adicione a tag [ACAO:LUZ_SALA_OFF] no final.`
                }
            ];

            escutaAtiva = true;
            try { recognition.start(); } catch(e) {}
        }

        function mudarStatus(estado, texto) {
            const el = document.getElementById('status-mic');
            el.innerText = texto;
            el.className = ""; // limpa classes
            el.classList.add(`status-${estado}`);
        }

        // --- RECONHECIMENTO DE VOZ CONTÍNUO ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onresult = async (event) => {
            const ultimaFala = event.results[event.results.length - 1][0].transcript.trim();
            const falaMinuscula = ultimaFala.toLowerCase();
            const nomeMinusculo = nomeAssistente.toLowerCase();

            // 1. VERIFICA COMANDO DE PAUSA ("Mestre parar de falar")
            if (falaMinuscula.includes(nomeMinusculo) && (falaMinuscula.includes('parar de falar') || falaMinuscula.includes('pausar') || falaMinuscula.includes('dormir') || falaMinuscula.includes('fique quieto'))) {
                modoConversaAtivo = false;
                adicionarAoLog("Você", ultimaFala, "msg-usuario");
                adicionarAoLog("Sistema", `Assistente pausado. Ele está ouvindo o ambiente, mas não vai interferir. Diga "${nomeAssistente} voltar a falar" para reativar.`, "msg-sistema");
                mudarStatus("dormindo", `😴 Pausado. Diga "${nomeAssistente} voltar a falar"`);
                falarTexto("Tudo bem, estou pausando. Me chame quando quiser conversar.");
                return;
            }

            // 2. VERIFICA COMANDO DE RETORNO ("Mestre voltar a falar")
            if (!modoConversaAtivo && falaMinuscula.includes(nomeMinusculo) && (falaMinuscula.includes('voltar a falar') || falaMinuscula.includes('acordar') || falaMinuscula.includes('voltar'))) {
                modoConversaAtivo = true;
                adicionarAoLog("Você", ultimaFala, "msg-usuario");
                mudarStatus("ativo", "🎙️ Modo Conversa Ativo! Pode falar.");
                falarTexto("Estou de volta! Em que posso te ajudar agora?");
                return;
            }

            // 3. SE ESTIVER PAUSADO, IGNORA TUDO QUE FOR DITO
            if (!modoConversaAtivo) return;

            // 4. SE ESTIVER ATIVO, PROCESSA QUALQUER FRASE NORMALMENTE
            escutaAtiva = false;
            recognition.stop();
            mudarStatus("pensando", "🤔 Formulando resposta...");
            
            adicionarAoLog("Você", ultimaFala, "msg-usuario");
            await processarComandoComGroq(ultimaFala);
        };

        recognition.onend = () => {
            if (escutaAtiva) {
                setTimeout(() => { try { recognition.start(); } catch(e) {} }, 300);
            }
        };

        recognition.onerror = (event) => {
            if(event.error !== "no-speech") console.log("Erro de voz:", event.error);
        };

        document.getElementById('btn-falar').addEventListener('click', () => {
            escutaAtiva = true;
            try { recognition.start(); } catch(e) {}
        });

        // --- RESPOSTA DE VOZ HUMANIZADA ---
        function falarTexto(texto) {
            const falaLimpa = texto.replace(/[*_~`#]/g, '');
            const synth = window.speechSynthesis;
            const utterThis = new SpeechSynthesisUtterance(falaLimpa);
            utterThis.lang = 'pt-BR';
            
            // Aplica a voz melhorada se estiver disponível
            if (vozPreferida) {
                utterThis.voice = vozPreferida;
            }
            
            // Deixa a voz levemente mais humana (ajuste de velocidade e tom)
            utterThis.rate = 1.05; // Um pouquinho mais rápido tira a impressão de robô lento
            utterThis.pitch = 1.0; 
            
            utterThis.onend = () => {
                escutaAtiva = true;
                if(modoConversaAtivo) mudarStatus("ativo", "🎙️ Ouvindo...");
                try { recognition.start(); } catch(e) {}
            };
            
            synth.speak(utterThis);
        }

        function formatarTextoChat(texto) {
            return texto.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>').replace(/\n/g, '<br>');
        }

        function adicionarAoLog(quem, texto, classe) {
            const log = document.getElementById('chat-log');
            log.innerHTML += `<div class="mensagem ${classe}"><strong>${quem}:</strong> ${formatarTextoChat(texto)}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // --- INTEGRAÇÃO COM A GROQ API ---
        async function processarComandoComGroq(texto) {
            historicoMensagens.push({ role: "user", content: texto });

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${GROQ_API_KEY.trim()}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: historicoMensagens
                    })
                });

                if(!response.ok) throw new Error(await response.text());

                const data = await response.json();
                let respostaAI = data.choices[0].message.content;
                let textoParaApenasFalar = respostaAI;

                // --- INTERCEPTAÇÃO: CASA INTELIGENTE ---
                if (respostaAI.includes("[ACAO:LUZ_SALA_ON]")) {
                    textoParaApenasFalar = textoParaApenasFalar.replace("[ACAO:LUZ_SALA_ON]", ""); 
                    respostaAI = respostaAI.replace("[ACAO:LUZ_SALA_ON]", "<br><small style='color:#00ff00;'>⚡ Comando executado: Luz ligada!</small>");
                    set(ref(database, `assitente_AI/usuarios/${usuarioAtual.uid}/casa/luz_sala`), true);
                }

                if (respostaAI.includes("[ACAO:LUZ_SALA_OFF]")) {
                    textoParaApenasFalar = textoParaApenasFalar.replace("[ACAO:LUZ_SALA_OFF]", ""); 
                    respostaAI = respostaAI.replace("[ACAO:LUZ_SALA_OFF]", "<br><small style='color:#ff0000;'>⚡ Comando executado: Luz desligada!</small>");
                    set(ref(database, `assitente_AI/usuarios/${usuarioAtual.uid}/casa/luz_sala`), false);
                }

                historicoMensagens.push({ role: "assistant", content: data.choices[0].message.content });
                
                adicionarAoLog(nomeAssistente, respostaAI, "msg-ia");
                falarTexto(textoParaApenasFalar);

            } catch (error) {
                console.error("Falha na Groq:", error);
                adicionarAoLog("Sistema", `Erro ao conectar na rede.`, "msg-erro");
                
                escutaAtiva = true;
                if(modoConversaAtivo) mudarStatus("ativo", "🎙️ Ouvindo...");
                try { recognition.start(); } catch(e) {}
            }
        }
    </script>
</body>
</html>
