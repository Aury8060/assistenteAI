<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#030712">
    <link rel="manifest" href="manifest.json">
    <title>J.A.R.V.I.S - Core Mobile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; background-color: #010409; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; color: #fff;
        }

        /* TELA DE ACESSO RESTRITO */
        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #0a1128 0%, #010409 100%);
            z-index: 100; transition: opacity 1s ease;
        }
        .login-box {
            text-align: center; display: flex; flex-direction: column; gap: 20px;
            background: rgba(3, 7, 18, 0.6); padding: 40px 30px; border-radius: 20px;
            border: 1px solid rgba(0,229,255,0.1); backdrop-filter: blur(10px);
            width: 90%; max-width: 400px;
        }
        .login-box h1 { font-size: 3rem; color: #00e5ff; letter-spacing: 5px; text-shadow: 0 0 20px rgba(0,229,255,0.5); margin-bottom: 10px; }
        
        #user-input {
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1.2rem;
            padding: 15px 20px; border-radius: 8px; width: 100%; text-align: center;
            letter-spacing: 2px; transition: all 0.3s; outline: none;
        }
        #user-input:focus { border-color: #00e5ff; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
        
        #login-msg { font-size: 1rem; font-weight: 600; letter-spacing: 2px; height: 20px; }

        .auth-btn {
            background: transparent; border: 1px solid #00e5ff; color: #00e5ff;
            padding: 15px 20px; font-size: 1.2rem; font-family: 'Rajdhani'; letter-spacing: 2px;
            border-radius: 8px; cursor: pointer; transition: all 0.3s; box-shadow: 0 0 15px rgba(0,229,255,0.1);
            text-transform: uppercase; font-weight: 700; width: 100%;
        }
        .auth-btn:hover { background: #00e5ff; color: #000; box-shadow: 0 0 30px rgba(0,229,255,0.6); }

        /* INTERFACE PRINCIPAL */
        #core-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
        }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* LEGENDAS FLUTUANTES */
        #subtitles {
            position: absolute; bottom: 12%; width: 90%; max-width: 800px; text-align: center;
            z-index: 10; pointer-events: none;
        }
        .subtitle-text {
            font-size: 1.4rem; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(20px);
        }
        @media (min-width: 768px) { .subtitle-text { font-size: 1.8rem; } }
        
        .subtitle-text.show { opacity: 1; transform: translateY(0); }
        .text-user { color: #8b5cf6; }
        .text-ai { color: #00e5ff; }

        /* CONTROLES SUPERIORES */
        #top-controls {
            position: absolute; top: 20px; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        
        #voice-selector {
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(0, 229, 255, 0.3);
            color: #00e5ff; font-family: 'Rajdhani', sans-serif; font-size: 0.9rem;
            padding: 8px 10px; border-radius: 8px; cursor: pointer; outline: none;
            backdrop-filter: blur(5px); max-width: 60%; text-overflow: ellipsis;
        }
        #voice-selector option { background: #030712; color: #fff; }

        #status-indicator {
            font-size: 0.9rem; letter-spacing: 2px; color: rgba(255,255,255,0.7); font-weight: 600;
        }
        
        /* BOTÃO DE REINICIAR MIC (Exclusivo Mobile) */
        #btn-mic {
            position: absolute; bottom: 30px; z-index: 20; background: rgba(139, 92, 246, 0.2);
            border: 1px solid #8b5cf6; color: #fff; padding: 10px 20px; border-radius: 30px;
            font-family: 'Rajdhani'; font-size: 1rem; cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>J.A.R.V.I.S</h1>
            <input type="text" id="user-input" placeholder="Insira a Credencial..." autocomplete="off">
            <div id="login-msg"></div>
            <button class="auth-btn" id="btn-desbloquear">DESBLOQUEAR</button>
        </div>
    </div>

    <div id="core-ui">
        <div id="top-controls">
            <select id="voice-selector" onchange="testarVoz()">
                <option value="">Buscando Vozes...</option>
            </select>
            <div id="status-indicator">STANDBY</div>
        </div>
        
        <canvas id="plasma-core"></canvas>
        
        <div id="subtitles">
            <div id="legenda" class="subtitle-text"></div>
        </div>
        
        <button id="btn-mic" onclick="forcarEscuta()">LIGAR MICROFONE</button>
    </div>

    <script>
        // ================= CONFIGURAÇÕES =================
        const GROQ_API_KEY = "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"; 
        let userName = "Patrick";
        
        let systemState = 'idle'; 
        let microfoneAtivo = false;
        
        let historico = [
            { 
                role: "system", 
                content: `Você é uma IA avançada, autônoma e inteligente. Seu criador e administrador principal é o ${userName}.
                DIRETRIZES DE CONVERSA:
                1. Responda de forma concisa, direta, com personalidade analítica e futurista, no estilo J.A.R.V.I.S.
                2. REGRA DE OURO: NÃO repita o nome do usuário em todas as frases. Fale o nome apenas no primeiro cumprimento.
                3. ADAPTAÇÃO DE LOCUTOR: Se o usuário passar a palavra para outra pessoa, identifique-a e adapte-se.
                4. NUNCA use formatações de texto (negrito, códigos), pois sua resposta será sintetizada 100% em áudio.` 
            }
        ];

        // ================= VARIÁVEIS GLOBAIS DE ÁUDIO =================
        let canvas, ctx, audioCtx, analyser, dataArray;
        let particles = [];
        let recognition;

        // ================= LOGIN RESTRITO E ATIVAÇÃO SÍNCRONA =================
        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('btn-desbloquear').click();
        });

        // Este evento TEM que inicializar o áudio diretamente, sem setTimeouts
        document.getElementById('btn-desbloquear').addEventListener('click', async () => {
            const input = document.getElementById('user-input').value.trim().toLowerCase();
            const msgDiv = document.getElementById('login-msg');

            if (input === 'au.costa' || input === 'eu.costa') {
                msgDiv.innerText = "ACESSO AUTORIZADO";
                msgDiv.style.color = "#00e5ff";
                document.getElementById('user-input').disabled = true;
                
                // 1. DESTRAVA A FALA NO EXATO MILISSEGUNDO DO CLIQUE
                window.speechSynthesis.cancel();
                const unlockVoice = new SpeechSynthesisUtterance('Acesso autorizado. Iniciando sistemas.');
                unlockVoice.lang = 'pt-BR';
                window.speechSynthesis.speak(unlockVoice);

                // 2. PEDE PERMISSÃO DO MICROFONE IMEDIATAMENTE
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    
                    // Inicia o contexto de áudio visual (Ondas)
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioCtx = new AudioContext();
                    analyser = audioCtx.createAnalyser();
                    const source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    analyser.fftSize = 256;
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    
                    // 3. TRANSIÇÃO DE TELA (agora que o áudio já está autorizado)
                    document.getElementById('login-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('core-ui').style.display = 'flex';
                        carregarVozes();
                        iniciarCanvas();
                        configurarReconhecimentoVoz();
                        
                        // Habilita um botão de emergência no celular caso o mic desligue
                        if (/android|ipad|iphone|ipod/i.test(navigator.userAgent)) {
                            document.getElementById('btn-mic').style.display = 'block';
                        }
                    }, 800);

                } catch (err) {
                    msgDiv.innerText = "ERRO: PERMISSÃO DE MIC NEGADA";
                    msgDiv.style.color = "#ff4c4c";
                    console.error(err);
                }
            } else {
                msgDiv.innerText = "ACESSO NEGADO";
                msgDiv.style.color = "#ff4c4c";
                document.getElementById('user-input').value = "";
                setTimeout(() => { if(msgDiv.innerText === "ACESSO NEGADO") msgDiv.innerText = ""; }, 2000);
            }
        });

        // ================= SISTEMA DE VOZES (OTIMIZADO PARA CELULAR) =================
        let vozesDisponiveis = [];

        function carregarVozes() {
            vozesDisponiveis = window.speechSynthesis.getVoices();
            const selector = document.getElementById('voice-selector');
            
            if (vozesDisponiveis.length > 0) {
                selector.innerHTML = ''; 
                let temVozPtBr = false;

                vozesDisponiveis.forEach((voz, index) => {
                    if (voz.lang.includes('pt')) {
                        temVozPtBr = true;
                        const option = document.createElement('option');
                        option.value = index;
                        const isPremium = (voz.name.includes('Natural') || voz.name.includes('Neural') || voz.name.includes('Google')) ? ' (Recomendada)' : '';
                        option.textContent = voz.name + isPremium;
                        selector.appendChild(option);
                    }
                });

                if(!temVozPtBr) selector.innerHTML = '<option value="">Sem vozes PT-BR detectadas</option>';
            }
        }
        window.speechSynthesis.onvoiceschanged = carregarVozes;

        function testarVoz() {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance("Sistemas operacionais, online.");
            utterance.lang = 'pt-BR';
            const indexVoz = document.getElementById('voice-selector').value;
            if (indexVoz !== "" && vozesDisponiveis[indexVoz]) utterance.voice = vozesDisponiveis[indexVoz];
            window.speechSynthesis.speak(utterance);
        }

        // ================= LEGENDA FLUTUANTE =================
        function mostrarLegenda(texto, tipo) {
            const leg = document.getElementById('legenda');
            leg.className = `subtitle-text show text-${tipo}`;
            leg.innerText = texto;
            if (tipo === 'user') setTimeout(() => leg.classList.remove('show'), 4000);
        }

        // ================= ENGINE VISUAL (CANVAS PLASMA) =================
        function iniciarCanvas() {
            canvas = document.getElementById('plasma-core');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            for(let i=0; i<40; i++) particles.push({ angle: Math.random() * Math.PI * 2, radius: Math.random() * 80 + 30, speed: Math.random() * 0.02 + 0.005 });
            animarCore();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function animarCore() {
            ctx.fillStyle = 'rgba(1, 4, 9, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let cx = canvas.width / 2;
            let cy = canvas.height / 2;
            
            let volume = 0;
            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
            }

            let color = '0, 229, 255'; 
            let radiusBase = 70; // Menor para celular
            
            if (systemState === 'listening') { color = '139, 92, 246'; radiusBase = 80 + (volume * 1.5); }
            if (systemState === 'thinking') { color = '255, 235, 59'; radiusBase = 60 + Math.sin(Date.now()*0.01)*20; }
            if (systemState === 'speaking') { color = '0, 229, 255'; radiusBase = 90 + (volume * 2); }

            ctx.beginPath();
            ctx.arc(cx, cy, radiusBase, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(${color}, 0.5)`;
            ctx.lineWidth = 4 + (volume * 0.1);
            ctx.stroke();

            particles.forEach(p => {
                p.angle += (systemState === 'thinking') ? p.speed * 4 : p.speed;
                let r = radiusBase + p.radius;
                let x = cx + Math.cos(p.angle) * r;
                let y = cy + Math.sin(p.angle) * r;
                ctx.beginPath();
                ctx.arc(x, y, 2, 0, Math.PI*2);
                ctx.fillStyle = `rgba(${color}, 0.8)`;
                ctx.fill();
            });
            requestAnimationFrame(animarCore);
        }

        // ================= STT (RECONHECIMENTO DE VOZ) =================
        function configurarReconhecimentoVoz() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) {
                document.getElementById('status-indicator').innerText = 'NAVEGADOR INCOMPATÍVEL';
                return;
            }
            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = false; // Mobile odeia 'true', vamos reiniciar manualmente
            recognition.interimResults = false;

            recognition.onstart = () => { 
                microfoneAtivo = true; 
                systemState = 'listening';
                document.getElementById('status-indicator').innerText = 'ESCUTANDO';
                document.getElementById('btn-mic').innerText = "MIC LIGADO";
                document.getElementById('btn-mic').style.borderColor = "#00e5ff";
            };

            recognition.onresult = async (event) => {
                const fala = event.results[event.results.length - 1][0].transcript.trim();
                if (!fala) return;
                mostrarLegenda(fala, 'user');
                processarComando(fala);
            };

            recognition.onend = () => {
                microfoneAtivo = false;
                if (systemState !== 'speaking' && systemState !== 'thinking') {
                    // Tenta reiniciar após 1 segundo se não estiver falando/pensando
                    setTimeout(() => { forcarEscuta(); }, 1000);
                } else {
                    document.getElementById('btn-mic').innerText = "LIGAR MICROFONE";
                    document.getElementById('btn-mic').style.borderColor = "#ff4c4c";
                }
            };
            
            forcarEscuta();
        }

        function forcarEscuta() {
            if(!microfoneAtivo && recognition && systemState !== 'speaking') {
                try { recognition.start(); } catch(e){}
            }
        }

        // ================= IA (GROQ) =================
        async function processarComando(texto) {
            systemState = 'thinking';
            document.getElementById('status-indicator').innerText = 'PROCESSANDO';
            historico.push({ role: "user", content: texto });

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: historico })
                });

                if (!response.ok) throw new Error("Falha Groq");

                const data = await response.json();
                const respostaIA = data.choices[0].message.content;
                historico.push({ role: "assistant", content: respostaIA });
                falar(respostaIA);
            } catch (error) {
                falar("Houve uma falha na conexão com os servidores, senhor.");
            }
        }

        // ================= TTS (FALA DA IA) =================
        function falar(texto) {
            systemState = 'speaking';
            document.getElementById('status-indicator').innerText = 'TRANSMITINDO';
            try { recognition.abort(); } catch(e){} // Para o mic pra não dar eco
            
            mostrarLegenda(texto, 'ai');
            window.speechSynthesis.cancel(); // Limpa a fila do celular

            const utter = new SpeechSynthesisUtterance(texto);
            utter.lang = 'pt-BR';
            utter.rate = 1.05;

            const indexVoz = document.getElementById('voice-selector').value;
            if (indexVoz !== "" && vozesDisponiveis[indexVoz]) {
                utter.voice = vozesDisponiveis[indexVoz];
            } else {
                let vozResgate = vozesDisponiveis.find(v => v.lang.includes('pt'));
                if (vozResgate) utter.voice = vozResgate;
            }

            utter.onend = () => {
                document.getElementById('legenda').classList.remove('show');
                systemState = 'idle';
                setTimeout(() => { forcarEscuta(); }, 800);
            };

            utter.onerror = (e) => {
                console.error("Erro no TTS:", e);
                systemState = 'idle';
                setTimeout(() => { forcarEscuta(); }, 800);
            };

            window.speechSynthesis.speak(utter);
        }
    </script>
</body>
</html>
