<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta-Feira - Interface V4.1 (Anti-Eco Absoluto)</title>
    
    <!-- Fontes Futuristas -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; background-color: #030712; color: #e5e7eb; 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* FUNDO FUTURÍSTA ANIMADO */
        body::before, body::after {
            content: ''; position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; animation: flutuar 15s infinite alternate;
        }
        body::before { width: 400px; height: 400px; background: rgba(0, 229, 255, 0.15); top: -10%; left: -10%; }
        body::after { width: 500px; height: 500px; background: rgba(139, 92, 246, 0.15); bottom: -10%; right: -10%; animation-delay: -5s; }
        @keyframes flutuar { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.3); border-radius: 10px; }

        /* TELA DE LOGIN */
        #tela-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-box {
            background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 229, 255, 0.2); border-radius: 24px; 
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
            padding: 50px; width: 100%; max-width: 450px; text-align: center;
        }
        .login-box h2 { font-family: 'Rajdhani', sans-serif; font-size: 2.2rem; margin-bottom: 25px; color: #00e5ff; letter-spacing: 2px; }

        input { 
            width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.5); 
            color: white; font-size: 16px; font-family: 'Inter', sans-serif; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #00e5ff; box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }

        button { 
            width: 100%; padding: 16px; font-size: 16px; font-weight: 600; 
            border-radius: 12px; border: none; cursor: pointer; 
            background: linear-gradient(135deg, #00adb5, #00e5ff); color: #000; 
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0, 229, 255, 0.4); }

        /* LAYOUT PRINCIPAL */
        #app-layout { display: flex; width: 100%; height: 100%; }

        /* SIDEBAR */
        #sidebar {
            width: 280px; height: 100%;
            background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; padding: 20px 10px;
        }
        .logo-area { text-align: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
        .logo-area h3 { font-family: 'Rajdhani', sans-serif; color: #00e5ff; letter-spacing: 2px; font-size: 1.5rem; }
        
        .nav-item {
            display: flex; align-items: center; padding: 15px 20px; color: #9ca3af; text-decoration: none; 
            border-radius: 12px; margin-bottom: 8px; transition: all 0.3s; cursor: pointer; font-weight: 500;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .nav-item.ativo { background: rgba(0, 229, 255, 0.1); color: #00e5ff; border: 1px solid rgba(0, 229, 255, 0.2); }
        .nav-icon { font-size: 1.2rem; margin-right: 15px; }

        /* ÁREA PRINCIPAL */
        #main-content { flex: 1; display: flex; flex-direction: column; padding: 20px 40px; position: relative; }

        /* STATUS DA IA ANIMADO */
        #status-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(17, 24, 39, 0.4); padding: 15px 25px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;
        }
        .ai-status-group { display: flex; align-items: center; gap: 15px; }
        .ai-core { width: 15px; height: 15px; border-radius: 50%; transition: all 0.5s ease; }
        
        /* Modos do Status */
        .status-ativo { background: #00e5ff; box-shadow: 0 0 15px #00e5ff; animation: pulsar-ativo 2s infinite; }
        .status-dormindo { background: #ff4c4c; box-shadow: 0 0 10px #ff4c4c; }
        .status-pensando { background: #8b5cf6; box-shadow: 0 0 20px #8b5cf6; animation: pulsar-pensando 1s infinite alternate; }
        .status-pausado { background: #ffeb3b; box-shadow: 0 0 15px #ffeb3b; }
        .status-bloqueado { background: #f97316; box-shadow: 0 0 15px #f97316; } /* Quando está falando (ignora mic) */
        
        @keyframes pulsar-ativo { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        @keyframes pulsar-pensando { 0% { transform: scale(1); } 100% { transform: scale(1.5); } }

        #texto-status { font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 1px; color: #00e5ff; }
        #btn-microfone { background: transparent; border: 1px solid rgba(255,255,255,0.2); width: auto; padding: 8px 15px; font-size: 12px; color: #fff; }
        #btn-microfone:hover { border-color: #00e5ff; }

        /* LOG DE CHAT */
        #chat-log { flex: 1; overflow-y: auto; padding-right: 15px; display: flex; flex-direction: column; gap: 15px; }
        .mensagem { padding: 15px 20px; line-height: 1.6; font-size: 15px; border-radius: 16px; max-width: 85%; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg-usuario { background: rgba(255, 255, 255, 0.05); color: #e5e7eb; align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .msg-ia { background: rgba(0, 229, 255, 0.05); color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(0, 229, 255, 0.2); box-shadow: 0 4px 15px rgba(0, 229, 255, 0.05); }
        .msg-ia strong { color: #00e5ff; font-family: 'Rajdhani', sans-serif; font-size: 18px; letter-spacing: 1px; }
        
        pre { background: #000; padding: 12px; border-radius: 8px; overflow-x: auto; margin-top: 8px; border: 1px solid #333; }
        code { font-family: 'Courier New', monospace; color: #00ffcc; font-size: 14px; }
        .escondido { display: none !important; }
    </style>
</head>
<body>

    <div id="tela-login">
        <div class="login-box">
            <h2>SISTEMA CORE</h2>
            <p style="margin-bottom: 25px; color: #9ca3af; font-size: 14px;">Autenticação requerida.</p>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button id="btn-login">INICIAR CONEXÃO</button>
        </div>
    </div>

    <div id="app-layout" class="escondido">
        <nav id="sidebar">
            <div class="logo-area">
                <h3 id="nome-assistente-sidebar">Sexta-Feira</h3>
                <p style="font-size: 12px; color: #00e5ff;">Inteligência Autônoma</p>
            </div>
            
            <div class="nav-item"><span class="nav-icon">🏠</span> Dashboard</div>
            <div class="nav-item ativo"><span class="nav-icon">💬</span> Conversa</div>
            <div class="nav-item" onclick="limparMemoria()"><span class="nav-icon">🧠</span> Limpar Memória</div>
            <div class="nav-item"><span class="nav-icon">📁</span> Histórico</div>
            <div class="nav-item"><span class="nav-icon">⚙</span> Configurações</div>
            <div class="nav-item"><span class="nav-icon">🎤</span> Voz</div>
            <div class="nav-item"><span class="nav-icon">📡</span> Casa Inteligente</div>
            <div class="nav-item"><span class="nav-icon">📊</span> Status</div>
        </nav>

        <main id="main-content">
            <div id="status-bar">
                <div class="ai-status-group">
                    <div id="core-visualizer" class="ai-core status-ativo"></div>
                    <span id="texto-status">SISTEMA ONLINE - ESCUTANDO</span>
                </div>
                <button id="btn-microfone">🔄 Reset Mic</button>
            </div>
            <div id="chat-log"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBlig3r_GYe6QH4ZpVaYw13TtJSnETdx88",
            authDomain: "trick-house8060.firebaseapp.com",
            databaseURL: "https://trick-house8060-default-rtdb.firebaseio.com",
            projectId: "trick-house8060",
            storageBucket: "trick-house8060.firebasestorage.app",
            messagingSenderId: "735425634096",
            appId: "1:735425634096:web:03e51dad9864ed486472f5",
            measurementId: "G-FVDZY435DE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // CHAVE GROQ
        const GROQ_API_KEY = "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"; 

        let nomeAssistente = "Mestre"; 
        let historicoMensagens = [];
        let usuarioAtual = null;

        // --- SISTEMA DE CONTROLE ABSOLUTO DE ESTADO ---
        let modoConversaAtivo = true; // Se responde as perguntas (Acordado vs Dormindo)
        let iaFalando = false;        // Trava 1: A IA está reproduzindo som neste exato momento
        let ecoCooldown = false;      // Trava 2: O Delay de segurança após a IA parar de falar
        let iaPausada = false;        // Trava 3: Se a fala foi congelada com o comando "tá ok"

        let vozEscolhida = null;
        window.speechSynthesis.onvoiceschanged = () => {
            const vozes = window.speechSynthesis.getVoices();
            vozEscolhida = vozes.find(v => v.lang.includes('pt') && (v.name.includes('Neural') || v.name.includes('Premium') || v.name.includes('Google'))) || vozes.find(v => v.lang.includes('pt'));
        };

        // LOGIN E MEMÓRIA
        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            if(!email || !senha) return;
            signInWithEmailAndPassword(auth, email, senha).catch(() => createUserWithEmailAndPassword(auth, email, senha));
        });

        window.limparMemoria = function() {
            localStorage.removeItem('memoria_ia');
            alert("Memória limpa.");
            location.reload();
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                usuarioAtual = user;
                document.getElementById('tela-login').classList.add('escondido');
                document.getElementById('app-layout').classList.remove('escondido');
                
                const dbRef = ref(database, `assitente_AI/usuarios/${user.uid}/perfil`);
                get(dbRef).then(snap => {
                    nomeAssistente = snap.exists() && snap.val().nomeAssistente ? snap.val().nomeAssistente : "Mestre";
                    document.getElementById('nome-assistente-sidebar').innerText = nomeAssistente;
                    
                    const memoriaSalva = localStorage.getItem('memoria_ia');
                    if (memoriaSalva) {
                        historicoMensagens = JSON.parse(memoriaSalva);
                    } else {
                        historicoMensagens = [{ 
                            role: "system", 
                            content: `Você é o ${nomeAssistente}. Seu usuário é o Patrick. Converse de igual pra igual, descontraído e parceiro.
                            RECEITAS (REGRA EXTREMA): 
                            - Fale APENAS o primeiro ingrediente e DÊ UMA PAUSA. 
                            - Só continue a receita se o usuário disser "prossiga", "próximo" ou "pode falar".
                            - Se ele disser "Fale tudo", forneça toda a receita.`
                        }];
                    }
                    iniciarMicrofone();
                });
            }
        });

        function alterarStatus(estado, textoCor, textoAviso) {
            const core = document.getElementById('core-visualizer');
            const texto = document.getElementById('texto-status');
            core.className = `ai-core status-${estado}`;
            texto.style.color = textoCor;
            texto.innerText = textoAviso;
        }

        // --- RECONHECIMENTO VOCAL COM FILTRO ANTI-ECO CIRÚRGICO ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.continuous = true;

        function iniciarMicrofone() { try { recognition.start(); } catch(e){} }

        recognition.onresult = async (event) => {
            const fala = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
            const nomeMinusculo = nomeAssistente.toLowerCase();

            // 1. CHECAGEM RÍGIDA DE INTERRUPÇÃO (Pausa/Resume da Fala)
            // Usa correspondência exata para evitar que o assistente se mutile se disser a palavra "para" no meio de uma frase
            const matchesPausa = ["para", "parou", "tá ok", "ta ok", "espera", "pausa"];
            const matchesContinua = ["continua", "prossiga", "pode falar", "pode continuar"];
            
            const pediuPausa = matchesPausa.includes(fala);
            const pediuContinua = matchesContinua.includes(fala);

            if (iaFalando && pediuPausa) {
                window.speechSynthesis.pause();
                iaFalando = false;
                iaPausada = true;
                adicionarAoLog("Você", fala, "msg-usuario");
                alterarStatus('pausado', '#ffeb3b', 'FALA CONGELADA (EM PAUSA)');
                return;
            }

            if (iaPausada && pediuContinua) {
                window.speechSynthesis.resume();
                iaPausada = false;
                iaFalando = true;
                adicionarAoLog("Você", fala, "msg-usuario");
                alterarStatus('bloqueado', '#f97316', 'FALA RETOMADA...');
                return;
            }

            // Se o usuário perguntou algo novo enquanto estava pausado, corta a voz antiga de vez
            if (iaPausada && !pediuContinua) {
                window.speechSynthesis.cancel();
                iaPausada = false;
                iaFalando = false;
            }

            // 2. BLOQUEIO DE ECO ABSOLUTO
            // Se a IA está falando ou acabou de terminar (está no cooldown de segurança de 1.5s)
            // IGNORA TOTALMENTE A FALA, pois é garantido que seja a caixa de som voltando pro microfone.
            if (iaFalando || ecoCooldown) {
                return; 
            }

            // 3. COMANDOS DE DORMIR / ACORDAR
            if (fala.includes(nomeMinusculo) && (fala.includes('dormir') || fala.includes('fique quieto'))) {
                modoConversaAtivo = false;
                alterarStatus('dormindo', '#ff4c4c', 'SISTEMA EM ESPERA (DORMINDO)');
                falarTexto("Beleza, vou ficar na minha.");
                return;
            }

            if (!modoConversaAtivo && fala.includes(nomeMinusculo) && (fala.includes('voltar') || fala.includes('acordar'))) {
                modoConversaAtivo = true;
                alterarStatus('ativo', '#00e5ff', 'SISTEMA ONLINE - ESCUTANDO');
                falarTexto("Tô de volta, parça.");
                return;
            }

            // 4. FLUXO NORMAL DA CONVERSA
            if (modoConversaAtivo) {
                adicionarAoLog("Você", event.results[event.results.length - 1][0].transcript, "msg-usuario");
                alterarStatus('pensando', '#8b5cf6', 'PROCESSANDO DADOS...');
                await processarComando(event.results[event.results.length - 1][0].transcript);
            }
        };

        recognition.onend = () => { setTimeout(() => { try { recognition.start(); } catch(e){} }, 400); };
        
        document.getElementById('btn-microfone').addEventListener('click', () => {
            window.speechSynthesis.cancel();
            iaFalando = false; iaPausada = false; ecoCooldown = false;
            alterarStatus('ativo', '#00e5ff', 'SISTEMA RESETADO E ONLINE');
            iniciarMicrofone();
        });

        // --- SISTEMA DE SÍNTESE COM TRAVA DE COOLDOWN ---
        function falarTexto(texto) {
            window.speechSynthesis.cancel(); // Zera envios acumulados
            
            const falaLimpa = texto.replace(/\[.*?\]/g, '').replace(/[*_~`#]/g, '');
            const utter = new SpeechSynthesisUtterance(falaLimpa);
            utter.lang = 'pt-BR';
            utter.rate = 1.05; 
            if(vozEscolhida) utter.voice = vozEscolhida;
            
            // Ativa o bloqueio de escuta enquanto fala
            utter.onstart = () => {
                iaFalando = true;
                iaPausada = false;
                ecoCooldown = false;
                alterarStatus('bloqueado', '#f97316', 'SISTEMA FALANDO (MIC BLOQUEADO PARA ECO)');
            };
            
            // Quando termina de falar, entra no período de segurança (Cooldown)
            utter.onend = () => {
                iaFalando = false;
                ecoCooldown = true; // Ativa a proteção de delay do microfone
                
                // Aguarda exatos 1.5 segundos antes de liberar o microfone para escutar você
                setTimeout(() => {
                    ecoCooldown = false;
                    if(modoConversaAtivo && !iaPausada) {
                        alterarStatus('ativo', '#00e5ff', 'SISTEMA ONLINE - ESCUTANDO');
                    }
                }, 1500);
            };

            window.speechSynthesis.speak(utter);
        }

        // --- INTEGRAÇÃO GROQ ---
        async function processarComando(texto) {
            historicoMensagens.push({ role: "user", content: texto });
            localStorage.setItem('memoria_ia', JSON.stringify(historicoMensagens));
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API_KEY.trim()}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: historicoMensagens })
                });
                
                if (!response.ok) throw new Error("Falha Groq");
                
                const data = await response.json();
                let resposta = data.choices[0].message.content;
                let falaVoz = resposta;

                if (resposta.includes("[ACAO:LUZ_SALA_ON]")) {
                    set(ref(database, `assitente_AI/usuarios/${usuarioAtual.uid}/casa/luz_sala`), true);
                    falaVoz = falaVoz.replace("[ACAO:LUZ_SALA_ON]", "");
                    resposta = resposta.replace("[ACAO:LUZ_SALA_ON]", "<br><small style='color:#00e5ff;'>[ ⚡ LUZ ATIVADA ]</small>");
                }
                if (resposta.includes("[ACAO:LUZ_SALA_OFF]")) {
                    set(ref(database, `assitente_AI/usuarios/${usuarioAtual.uid}/casa/luz_sala`), false);
                    falaVoz = falaVoz.replace("[ACAO:LUZ_SALA_OFF]", "");
                    resposta = resposta.replace("[ACAO:LUZ_SALA_OFF]", "<br><small style='color:#ff4c4c;'>[ ⚡ LUZ DESATIVADA ]</small>");
                }

                adicionarAoLog(nomeAssistente, resposta, "msg-ia");
                historicoMensagens.push({ role: "assistant", content: data.choices[0].message.content });
                localStorage.setItem('memoria_ia', JSON.stringify(historicoMensagens));
                
                falarTexto(falaVoz);

            } catch (error) {
                alterarStatus('ativo', '#00e5ff', 'SISTEMA ONLINE - ESCUTANDO');
            }
        }

        function adicionarAoLog(quem, texto, classe) {
            const log = document.getElementById('chat-log');
            const textoFormatado = texto.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>').replace(/\n/g, '<br>');
            log.innerHTML += `<div class="mensagem ${classe}">${classe === 'msg-ia' ? `<strong>${quem}</strong><br>` : ''}${textoFormatado}</div>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
